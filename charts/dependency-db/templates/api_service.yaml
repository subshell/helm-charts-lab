apiVersion: v1
kind: Service
metadata:
  name: {{ include "dependency-db.fullname.api" . }}
  labels:
    {{- include "dependency-db-api.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "dependency-db-api.selectorLabels" . | nindent 4 }}
