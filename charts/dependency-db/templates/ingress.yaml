{{- if .Values.ingress.enabled -}}
{{- $fullName := include "dependency-db.fullname.frontend" . -}}
{{- $apiServiceName := include "dependency-db.fullname.api" . -}}
{{- $svcPort := .Values.service.port -}}
{{- $jiraPort := .Values.jira.port -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ $fullName }}
  labels:
    {{- include "dependency-db-frontend.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/rewrite-target: /$1
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.ingress.ingressClassName }}
  ingressClassName: {{ .Values.ingress.ingressClassName }}
  {{- end -}}
  {{- if .Values.ingress.tls }}
  tls:
    {{- range .Values.ingress.tls }}
    - hosts:
        {{- range .hosts }}
        - {{ . | quote }}
        {{- end }}
      secretName: {{ .secretName }}
    {{- end }}
  {{- end }}
  rules:
    {{- range .Values.ingress.hosts }}
    - host: {{ . | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ $fullName }}
                port: 
                  number: {{ $svcPort }}
          - path: /api/db/(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: {{ $apiServiceName }}
                port:
                  number: {{ $svcPort }}
          - path: /api/jira/(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: {{ $apiServiceName }}-jira-service
                port:
                  number: {{ $jiraPort }}
    {{- end }}
  {{- end }}
