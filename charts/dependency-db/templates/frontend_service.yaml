apiVersion: v1
kind: Service
metadata:
  name: {{ include "dependency-db.fullname.frontend" . }}
  labels:
    {{- include "dependency-db-frontend.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "dependency-db-frontend.selectorLabels" . | nindent 4 }}
