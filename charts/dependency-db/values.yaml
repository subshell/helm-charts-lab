frontend:
  image:
    repository: docker.subshell.com/labday/dependency-db-frontend
    pullPolicy: Always
    tag: "latest"
  container:
    resources:
      requests:
        cpu: 100m
        memory: 512Mi
      limits:
        cpu: 500m
        memory: 1024Mi

api:
  image:
    repository: docker.subshell.com/labday/dependency-db-api
    pullPolicy: Always
    tag: "latest"
  container:
    resources:
      requests:
        cpu: 100m
        memory: 512Mi
      limits:
        cpu: 500m
        memory: 1024Mi
  authentication:
    secret:
      name: "dependency-db-sophora-credentials"
      usernameKey: "sophora-user"
      passwordKey: "sophora-password"
  config:

# TODO: update to neo4j config or the like when merging with the other helmchart
importerconfig:
  env:
    - name: NEO4J_URI
      value: "neo4j://localhost:7687"
  envFromSecrets:
    - secretRef: graph-db-pw-secret

jira:
  address: "https://jira.example.com"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

podAnnotations: {}

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: false
  annotations:
    {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  hosts:
  #  - host: chart-example.local
  tls: []
  #  - secretName: chart-example-tls
  #    hosts:
  #      - chart-example.local

nodeSelector: {}

tolerations: []

affinity: {}